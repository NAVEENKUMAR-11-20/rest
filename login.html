<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Ember & Ash login page for Google authentication." />
  <title>Login | Ember & Ash</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>🔥</text></svg>" />
</head>
<body class="login-body">
  <main class="login-page" aria-label="Login page">
    <section class="login-card" aria-labelledby="login-heading">
      <div class="login-brand">
        <h1 id="login-heading" class="brand-logo">Ember <em>&</em> Ash</h1>
        <p>Securely sign in with Google to continue to the restaurant dashboard and reservation experience.</p>
      </div>

      <div id="google-button"></div>
      <div id="login-error" class="login-error" aria-live="polite"></div>
      <p class="login-note">After signing in, you will be redirected to the restaurant home dashboard. If login fails, an error message will appear here.</p>
    </section>
  </main>

  <script src="https://accounts.google.com/gsi/client" async defer onload="window.dispatchEvent(new Event('google-loaded'))"></script>
  <script src="script.js"></script>
</body>
</html>
